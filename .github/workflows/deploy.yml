name: Deploy Hostinger

on:
  workflow_dispatch:
    inputs:
      upload_vendor:
        description: 'Enviar vendor.zip para extração manual na Hostinger'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare public document root
        run: |
          mkdir -p .deploy-public
          cp -a public/. .deploy-public/
          sed -i "s#__DIR__.'/../vendor/autoload.php'#__DIR__.'/vendor/autoload.php'#" .deploy-public/index.php
          sed -i "s#__DIR__.'/../bootstrap/app.php'#__DIR__.'/bootstrap/app.php'#" .deploy-public/index.php

      - name: Package PHP dependencies
        if: ${{ inputs.upload_vendor }}
        run: |
          mkdir -p .deploy
          zip -qr .deploy/vendor.zip vendor

      - name: Upload vendor archive by FTP
        if: ${{ inputs.upload_vendor }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-vendor-state.json

      - name: Deploy application by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-app-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.deploy/**
            **/.deploy-public/**
            .env
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**

      - name: Deploy public document root by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .deploy-public/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-public-state.json
